# distrobox.ini — Declarative container configuration
#
# Usage:
#   1. Build image first:  podman build -t ros2-slam -f .devcontainer/Dockerfile .
#      (or let setup.sh do it: bash .devcontainer/setup.sh)
#   2. Create container:   distrobox assemble create --file distrobox.ini
#   3. Enter:              distrobox enter slam-dev
#
# Destroy & recreate:
#   distrobox rm slam-dev
#   distrobox assemble create --file distrobox.ini

[slam-dev]
image=ros2-slam:latest
init=false
nvidia=false
pull=false
root=false
replace=false
start_now=false
additional_flags="--env ROS_DOMAIN_ID=42"
