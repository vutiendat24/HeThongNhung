; ═══════════════════════════════════════════════════════════════════════════════
; SLAM Tracking Car — ESP32 Firmware (PlatformIO + micro-ROS)
;
; Two environments:
;   esp32_main  — Main ESP32: motor control, servo, LDS02RR LiDAR, odometry
;   esp32_cam   — ESP32-CAM: MJPEG HTTP stream + micro-ROS telemetry
;
; Build:   pio run -e esp32_main
; Upload:  pio run -e esp32_main -t upload
; Monitor: pio device monitor -e esp32_main
; ═══════════════════════════════════════════════════════════════════════════════

[platformio]
default_envs = esp32_main

; ── Shared settings ──────────────────────────────────────────────────────────
[env]
platform = espressif32@2.0.18          ; Pin v2.x — v3.x has breaking changes
framework = arduino
monitor_speed = 115200
build_flags =
    -D MICRO_ROS_TRANSPORT_WIFI
    -D AGENT_PORT=8888

lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
    kaiaai/LDS                          ; LDS02RR driver

board_microros_distro = humble
board_microros_transport = wifi

; ── ESP32 Main (motor, servo, LiDAR, odom) ──────────────────────────────────
[env:esp32_main]
board = esp32dev
build_src_filter = +<*> -<cam_main.cpp>
build_flags =
    ${env.build_flags}
    -D BOARD_ESP32_MAIN

; ── ESP32-CAM (camera stream + micro-ROS telemetry) ─────────────────────────
[env:esp32_cam]
board = esp32cam
build_src_filter = +<*> -<main.cpp>
build_flags =
    ${env.build_flags}
    -D BOARD_ESP32_CAM
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    ${env.lib_deps}
    espressif/esp32-camera              ; ESP32-CAM camera driver
