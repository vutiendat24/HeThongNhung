# docker-compose.yml
services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"   
    volumes:
      - ./broker/mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build: .
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883